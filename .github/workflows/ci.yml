name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    name: lint · format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  test:
    name: build wasm · vet · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: wasm/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Vet (js/wasm)
        run: GOOS=js GOARCH=wasm go vet ./...
        working-directory: wasm

      - run: npm ci

      # `npm test` runs the pretest hook (build:wasm) then the node test runner.
      - name: Build wasm + run tests
        run: npm test
