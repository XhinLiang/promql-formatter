name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  wasm-build:
    name: build wasm · vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wasm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Vet
        run: go vet ./...

      - name: Build promqlparser.wasm
        run: GOOS=js GOARCH=wasm go build -o ../promqlparser.wasm .
